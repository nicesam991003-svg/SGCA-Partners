<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>캐시 강제 갱신</title></head>
<body>
<p id="status" style="font-family:sans-serif;font-size:1.1rem;padding:40px;">Firebase status 강제 published 업데이트 중...</p>
<pre id="log" style="font-family:monospace;padding:20px;background:#f4f4f4;margin:20px;border-radius:8px;"></pre>

<script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyAOOGNkjpW48SUkX7qZfE28hG-yLj4sMRI",
  authDomain: "sgca-platform-7abbc.firebaseapp.com",
  projectId: "sgca-platform-7abbc",
  storageBucket: "sgca-platform-7abbc.firebasestorage.app",
  messagingSenderId: "1076998535653",
  appId: "1:1076998535653:web:286639c3d92a7cfb8f970c"
});
const db = firebase.firestore();
const log = document.getElementById('log');
const st  = document.getElementById('status');

(async () => {
  try {
    log.textContent += '📋 전체 문서 조회 중...\n';
    const snap = await db.collection('insights').get();
    log.textContent += `총 ${snap.size}개 문서\n\n`;

    let updated = 0;
    for (const doc of snap.docs) {
      const d = doc.data();
      if (d.status !== 'published') {
        await db.collection('insights').doc(doc.id).update({ status: 'published' });
        log.textContent += `✅ published: ${(d.title||'').substring(0,40)}\n`;
        updated++;
      } else {
        log.textContent += `이미 published: ${(d.title||'').substring(0,40)}\n`;
      }
    }
    st.textContent = `완료! ${updated}개 문서를 published로 업데이트했습니다.`;
    log.textContent += `\n→ insights.html에서 리포트가 표시되는지 확인하세요.\n→ 확인 후 이 파일을 GitHub에서 삭제하세요.`;
  } catch(e) {
    st.textContent = '오류: ' + e.message;
  }
})();
</script>
</body>
</html>
