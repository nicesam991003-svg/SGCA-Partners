<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 페이지 - 리포트 등록 | SGCA Partners</title>
    <link rel="icon" type="image/svg+xml" href="images/logo.svg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <!-- Quill WYSIWYG Editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
</head>
<body style="background-color: #f4f6f9;">
    <!-- Admin Navbar -->
    <header class="navbar" style="position: static;">
        <div class="container" style="min-height: 80px; justify-content: space-between;">
            <a href="index.html" class="logo">
                <img src="images/logo.svg" alt="SGCA Partners" height="50">
            </a>
            <div style="display:flex; align-items:center; gap: 20px;">
                <a href="insights.html" style="font-weight:600; color:var(--color-slate-grey); text-decoration:underline;">인사이트 화면 보기</a>
                <div style="font-weight: 700; font-size: 1.2rem; color: var(--color-accent); background: rgba(211,164,92,0.1); padding: 5px 15px; border-radius: 20px;">관리자 모드</div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="admin-container">
            <div class="admin-header">
                <h2>인사이트 리포트 등록</h2>
                <p>이곳에서 작성한 내용은 인사이트(Insight) 페이지에 실시간 카드 뉴스로 반영됩니다.</p>
            </div>

            <form id="admin-form">
                <div class="form-group">
                    <label>리포트 제목</label>
                    <input type="text" id="post-title" required placeholder="예: FDA 의료기기 사이버보안 최신 가이드라인 발표">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>카테고리</label>
                        <select id="post-category" required style="width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; font-size: 1rem;">
                            <option value="">카테고리 선택</option>
                            <option value="management-system">경영시스템인증</option>
                            <option value="cyber-security">사이버보안</option>
                            <option value="product-certification">제품인증</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>작성 일자</label>
                        <input type="date" id="post-date" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>원문 링크 URL (선택사항)</label>
                    <input type="url" id="post-link" placeholder="예: https://blog.naver.com/... (카드 클릭 시 이동할 주소)">
                </div>
                <div class="form-group">
                    <label>요약 내용</label>
                    <textarea id="post-desc" required placeholder="리포트의 핵심 내용을 2~3줄로 요약해 주세요."></textarea>
                </div>
                <div class="form-group">
                    <label>원문 내용 (보고서 양식 유지 가능)</label>
                    <div id="editor-container" style="height: 350px; background: white;"></div>
                </div>
                <button type="submit" class="btn-submit">새 리포트 등록하기</button>
            </form>

            <div class="admin-list">
                <h3 style="margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; color: var(--color-deep-navy);">등록된 리포트 관리</h3>
                <div id="post-list-container">
                    <!-- 자바스크립트로 로컬 스토리지 목록 렌더링 -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-init.js"></script>
    <script>
        // 전역 db 변수는 js/firebase-init.js에서 설정됩니다.
        let editingId = null;
        let adminPosts = [];

        // Firebase 데이터 로드 및 렌더링
        async function renderList() {
            const container = document.getElementById('post-list-container');
            container.innerHTML = '<p style="color:#8892b0; text-align:center; padding: 30px 0;">데이터를 불러오는 중입니다...</p>';

            try {
                // Firebase에서 'insights' 컬렉션의 데이터를 작성일자 내림차순(최신순)으로 가져오기
                const querySnapshot = await db.collection("insights").orderBy("date", "desc").get();
                
                adminPosts = [];
                querySnapshot.forEach((doc) => {
                    adminPosts.push({ id: doc.id, ...doc.data() });
                });

                if (adminPosts.length === 0) {
                    container.innerHTML = '<p style="color:#8892b0; text-align:center; padding: 30px 0;">현재 등록된 리포트가 없습니다.</p>';
                    return;
                }

                let html = '';
                adminPosts.forEach(post => {
                    let categoryLabel = '';
                    switch(post.category) {
                        case 'management-system': categoryLabel = '경영시스템인증'; break;
                        case 'cyber-security': categoryLabel = '사이버보안'; break;
                        case 'product-certification': categoryLabel = '제품인증'; break;
                        default: categoryLabel = '미분류';
                    }
                    html += `
                        <div class="admin-item">
                            <div class="admin-item-info">
                                <div style="display:flex; align-items:center; gap:8px; margin-bottom:5px;">
                                    <span style="font-size:0.75rem; background:#f0f0f0; padding:2px 8px; border-radius:10px; color:#666;">${categoryLabel}</span>
                                    <h4 style="margin:0;">${post.title}</h4>
                                </div>
                                <p>${post.date} &nbsp;|&nbsp; ${post.desc.substring(0, 40)}...</p>
                            </div>
                            <div style="white-space: nowrap;">
                                <button type="button" class="btn-edit" data-id="${post.id}">수정</button>
                                <button type="button" class="btn-delete" data-id="${post.id}">삭제</button>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;

                // 수정 버튼 이벤트 리스너 추가
                document.querySelectorAll('.btn-edit').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const target = e.target;
                        editingId = target.getAttribute('data-id');
                        const post = adminPosts.find(p => p.id === editingId);
                        if (!post) return;

                        document.getElementById('post-title').value = post.title;
                        document.getElementById('post-category').value = post.category || '';
                        document.getElementById('post-date').value = post.date;
                        document.getElementById('post-link').value = post.link === '#' ? '' : post.link;
                        document.getElementById('post-desc').value = post.desc;
                        window.quill.root.innerHTML = post.fullContent || '';
                        
                        document.querySelector('.btn-submit').textContent = '리포트 수정 완료';
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    });
                });

                // 삭제 버튼 이벤트 리스너 추가
                document.querySelectorAll('.btn-delete').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const id = e.target.getAttribute('data-id');
                        if(confirm('정말 이 리포트를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) {
                            try {
                                await db.collection("insights").doc(id).delete();
                                alert('삭제되었습니다.');
                                
                                if (editingId === id) {
                                    editingId = null;
                                    document.getElementById('admin-form').reset();
                                    window.quill.root.innerHTML = '';
                                    document.getElementById('post-date').valueAsDate = new Date();
                                    document.querySelector('.btn-submit').textContent = '새 리포트 등록하기';
                                }
                                
                                renderList();
                            } catch (error) {
                                console.error("Error removing document: ", error);
                                alert("삭제 중 오류가 발생했습니다. (Firebase 설정을 확인하세요)");
                            }
                        }
                    });
                });

            } catch (error) {
                console.error("데이터 로드 실패: ", error);
                container.innerHTML = `<p style="color:#e74c3c; text-align:center; padding: 30px 0;">Firebase 설정이 완료되지 않았거나 오류가 발생했습니다.<br>콘솔(F12)을 확인하세요.</p>`;
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('post-date').valueAsDate = new Date();
            
            // Quill Editor 초기화
            window.quill = new Quill('#editor-container', {
                theme: 'snow',
                placeholder: '리포트의 전체 번역 내용을 자유롭게 작성하거나 구글 문서(Doc)에서 복사해 붙여넣어 주세요.',
                modules: {
                    toolbar: [
                        [{ 'header': [1, 2, 3, false] }],
                        ['bold', 'italic', 'underline', 'strike'],
                        [{ 'color': [] }, { 'background': [] }],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        ['link', 'image'],
                        ['clean']
                    ]
                }
            });
            
            // db 객체가 정상적으로 불러와졌는지 확인 후 렌더링
            if(db) {
                // 목록 로드 후 URL 쿼리 파라미터(?edit=ID) 확인하여 수정 모드 자동 진입
                await renderList();
                const urlParams = new URLSearchParams(window.location.search);
                const editId = urlParams.get('edit');
                if (editId) {
                    const post = adminPosts.find(p => p.id === editId);
                    if (post) {
                        editingId = editId;
                        document.getElementById('post-title').value = post.title || '';
                        document.getElementById('post-category').value = post.category || '';
                        document.getElementById('post-date').value = post.date || '';
                        document.getElementById('post-link').value = (post.link && post.link !== '#') ? post.link : '';
                        document.getElementById('post-desc').value = post.desc || '';
                        window.quill.root.innerHTML = post.fullContent || '';
                        document.querySelector('.btn-submit').textContent = '리포트 수정 완료';
                        // 폼 상단으로 부드럽게 스크롤
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                        // URL에서 파라미터 제거 (히스토리 오염 방지)
                        history.replaceState(null, '', 'admin.html');
                    } else {
                        alert('해당 리포트를 찾을 수 없습니다. 이미 삭제되었거나 ID가 잘못되었습니다.');
                    }
                }
            } else {
                document.getElementById('post-list-container').innerHTML = `<p style="color:#e74c3c; text-align:center; padding: 30px 0;">js/firebase-init.js 파일에서 Firebase 설정(Config)을 입력해 주세요.</p>`;
            }

            document.getElementById('admin-form').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                if(!db) {
                    alert('Firebase가 연결되지 않았습니다. js/firebase-init.js를 확인해주세요.');
                    return;
                }

                const title = document.getElementById('post-title').value;
                const category = document.getElementById('post-category').value;
                const date = document.getElementById('post-date').value;
                const link = document.getElementById('post-link').value || '#';
                const desc = document.getElementById('post-desc').value;
                
                // 에디터 내용이 비어있는 경우 (기본값인 빈 <p><br></p> 등 처리)
                let fullContent = window.quill.root.innerHTML;
                if (window.quill.getText().trim() === '' && !fullContent.includes('<img')) {
                    fullContent = '';
                }

                try {
                    if (editingId) {
                        // 기존 리포트 수정
                        await db.collection("insights").doc(editingId).update({
                            title, category, date, link, desc, fullContent
                        });
                        alert('인사이트 리포트가 성공적으로 수정되었습니다!');
                        editingId = null;
                        document.querySelector('.btn-submit').textContent = '새 리포트 등록하기';
                    } else {
                        // 새 리포트 등록
                        await db.collection("insights").add({
                            title, category, date, link, desc, fullContent, createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        alert('인사이트 리포트가 성공적으로 등록되었습니다!');
                    }
                    
                    // 폼 초기화 및 오늘 날짜 재설정
                    this.reset();
                    window.quill.root.innerHTML = '';
                    document.getElementById('post-date').valueAsDate = new Date();
                    
                    // 목록 다시 그리기
                    renderList();
                } catch (error) {
                    console.error("문서 저장 중 오류: ", error);
                    alert("저장 중 오류가 발생했습니다. Firebase 설정을 확인하세요.");
                }
            });
        });
    </script>
</body>
</html>
